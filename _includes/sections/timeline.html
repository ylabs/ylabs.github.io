<section class="section section--bordered" id="experience">
  <div class="container">
    <div class="section-header">
      <p class="section-label">Selected experience</p>
      <h2 class="section-title">Two decades of building</h2>
    </div>
    <div class="timeline">
      <div class="timeline-line" aria-hidden="true"></div>
      {% for entry in site.data.timeline %}
      <div class="timeline-item">
        <div class="timeline-meta">
          <p class="timeline-period">{{ entry.period }}</p>
          <p class="timeline-theme">{{ entry.theme }}</p>
        </div>
        <p class="timeline-desc">{{ entry.description }}</p>
      </div>
      {% endfor %}
    </div>
  </div>
</section>
