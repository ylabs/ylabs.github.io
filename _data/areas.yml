- id: ai-capability
  title: AI & Human Capability
  description: How artificial intelligence can augment and expand human potential — not just automate tasks, but create new possibilities for learning, creativity, and judgment. The most important question is not what AI can do, but what people can do with AI.

- id: healthcare
  title: Healthcare
  description: From clinical decision support to health system transformation, AI has genuine potential to improve outcomes, reduce disparities, and make quality care more accessible. The challenge is navigating the complexity of healthcare institutions while remaining focused on the patient.

- id: future-of-work
  title: Future of Work
  description: AI will reshape labor markets, organizational structures, and the nature of meaningful work. The transition can be handled well or poorly. We explore strategies for navigating this change in ways that are equitable, humane, and broadly beneficial.
