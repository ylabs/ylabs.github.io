- period: Early career
  theme: Building technical foundations
  description: Spent the first decade building engineering teams and technical infrastructure at the intersection of enterprise software and emerging internet platforms — learning how technology scales, and what makes it fail.

- period: Healthcare innovation
  theme: Technology as infrastructure for care
  description: Held senior technical leadership at a company that became foundational infrastructure for modern healthcare delivery, serving tens of millions of patients. Learned that healthcare transformation requires as much organizational change as technical innovation.

- period: Civic technology
  theme: Technology in service of democracy
  description: Contributed to organizations building digital tools for civic participation, government transparency, and democratic engagement. Worked alongside policy advocates, civil servants, and community organizers to understand what technology can and cannot do for democratic institutions.

- period: Education technology
  theme: Learning at scale, learning with depth
  description: Led product and engineering at platforms designed to connect people with economic opportunity through education and skills development. Built conviction that the hardest problems in edtech are human and institutional, not technical.

- period: Teaching & research
  theme: Ideas in conversation with practice
  description: Taught at UC Berkeley, exploring the intersection of technology, ethics, and society with the next generation of leaders. Published research and case studies. Spoke at technical conferences about organizational design, AI strategy, and the future of work.

- period: Advisory & institution building
  theme: Operating across sectors and geographies
  description: Advised major institutions including the World Bank on technology strategy and innovation. Served on nonprofit boards. Invested in early-stage founders. Built communities of practice across North America, Europe, and Africa — and founded Ylab as a platform for the next chapter of this work.
